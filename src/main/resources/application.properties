# Application
spring.application.name=expense-subscription-tracker

# MySQL Datasource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# JWT Configuration
jwt.secret=${JWT_SECRET:default-dev-secret-key-that-is-at-least-32-characters-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Server
server.port=8080

# Scheduler
spring.task.scheduling.pool.size=2
